<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crew Meetup 🪩</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 1px solid #ffffff18;
      padding: 28px 32px;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { margin-top: 6px; color: #aaa; font-size: 0.95rem; }
    .event-pills {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .pill {
      background: #ffffff12;
      border: 1px solid #ffffff20;
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.82rem;
      color: #ccc;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
      gap: 24px;
    }
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px;
    }
    .card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #eee;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input[type="text"],
    textarea,
    select {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input[type="text"]:focus,
    textarea:focus,
    select:focus { border-color: #6c63ff; }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: #1a1a1a; }

    .radio-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      text-transform: none;
      letter-spacing: 0;
      color: #ccc;
      transition: border-color 0.15s, background 0.15s;
      margin: 0;
    }
    .radio-group input[type="radio"] { display: none; }
    .radio-group input[type="radio"]:checked + span {
      /* handled via JS class */
    }
    .radio-group label.selected {
      border-color: #6c63ff;
      background: #6c63ff18;
      color: #fff;
    }

    button[type="submit"] {
      width: 100%;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    button[type="submit"]:hover  { background: #5a52e0; }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled { background: #444; cursor: not-allowed; }

    .success-msg {
      display: none;
      text-align: center;
      padding: 16px;
      border-radius: 8px;
      background: #1a3a2a;
      border: 1px solid #2d6a4a;
      color: #6fcf97;
      font-size: 0.95rem;
      margin-top: 12px;
    }

    /* ── Guest list ── */
    #guest-list { display: flex; flex-direction: column; gap: 12px; }

    .guest-card {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 14px 16px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .guest-name {
      font-weight: 600;
      font-size: 0.97rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 500;
    }
    .status-yes     { background: #1a3a2a; color: #6fcf97; }
    .status-maybe   { background: #3a2e1a; color: #f2994a; }
    .status-no      { background: #2a1a1a; color: #eb5757; }

    .guest-meta {
      margin-top: 7px;
      font-size: 0.85rem;
      color: #888;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .guest-meta span { display: flex; align-items: flex-start; gap: 6px; }
    .allergy-tag {
      display: inline-block;
      background: #3a1a1a;
      color: #f08080;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.78rem;
      margin-top: 4px;
    }

    .empty-state {
      text-align: center;
      color: #444;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .guest-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .btn-edit, .btn-delete {
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-edit   { background: #2a2a4a; color: #a0a0ff; }
    .btn-delete { background: #3a1a1a; color: #f08080; }
    .btn-edit:hover, .btn-delete:hover { opacity: 0.75; }

    .editing-banner {
      display: none;
      background: #2a2a4a;
      border: 1px solid #4a4aaa;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #a0a0ff;
      margin-bottom: 16px;
    }
    .editing-banner.visible { display: block; }
    .cancel-edit {
      background: none;
      border: none;
      color: #f08080;
      cursor: pointer;
      font-size: 0.82rem;
      margin-left: 8px;
      text-decoration: underline;
    }

    .count-label {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 14px;
    }
    .count-label span { color: #888; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <h1>Crew Meetup 🪩</h1>
  <p>Potluck · Sip & Paint · Good vibes</p>
  <div class="event-pills">
    <span class="pill">📅 Sunday, June 14</span>
    <span class="pill">🕔 5:00 PM</span>
    <span class="pill">🏠 Host's place</span>
  </div>
</header>

<div class="layout">

  <!-- ── Form column ── -->
  <div class="card">
    <h2>✍️ Sign yourself up</h2>
    <div class="editing-banner" id="editing-banner">
      ✏️ Editing your response — make changes and hit Update.
      <button class="cancel-edit" id="cancel-edit">Cancel</button>
    </div>
    <form id="signup-form">

      <div class="form-group">
        <label>Your name *</label>
        <input type="text" id="name" placeholder="e.g. J" required />
      </div>

      <div class="form-group">
        <label>Are you coming?</label>
        <div class="radio-group" id="attending-group">
          <label class="selected">
            <input type="radio" name="attending" value="yes" checked />
            <span>✅ Coming</span>
          </label>
          <label>
            <input type="radio" name="attending" value="maybe" />
            <span>🤔 Maybe</span>
          </label>
          <label>
            <input type="radio" name="attending" value="no" />
            <span>❌ Can't make it</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>What are you bringing?</label>
        <input type="text" id="bringing" placeholder="e.g. Charcuterie board, drinks, dessert…" />
      </div>

      <div class="form-group">
        <label>Allergies / dietary restrictions</label>
        <input type="text" id="allergies" placeholder="e.g. nut allergy, vegan, gluten-free…" />
      </div>

      <div class="form-group">
        <label>Anything else? (optional)</label>
        <textarea id="notes" placeholder="Questions, requests, hype…"></textarea>
      </div>

      <button type="submit" id="submit-btn">Submit →</button>
      <div class="success-msg" id="success-msg">
        🎉 You're on the list! See you there.
      </div>
    </form>
  </div>

  <!-- ── Guest list column ── -->
  <div class="card">
    <h2>👥 Who's coming</h2>
    <div class="count-label">Showing <span id="guest-count">0</span> response(s) · updates live</div>
    <div id="guest-list">
      <div class="empty-state">No responses yet — be the first!</div>
    </div>
  </div>

</div>

<!-- Firebase compat SDK (no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  // ─────────────────────────────────────────────
  // 🔧 PASTE YOUR FIREBASE CONFIG HERE
  // Get it from: Firebase Console → Project Settings → Your apps → Config
  // ─────────────────────────────────────────────
  const firebaseConfig = {
    apiKey:            "AIzaSyBydDeb4MR31KLE5UGpjBmarCBPyZY6Zag",
    authDomain:        "crew-meetup-neurofamily.firebaseapp.com",
    projectId:         "crew-meetup-neurofamily",
    storageBucket:     "crew-meetup-neurofamily.firebasestorage.app",
    messagingSenderId: "178561847327",
    appId:             "1:178561847327:web:d7c2a9550cfc384de9c52a",
  };
  // ─────────────────────────────────────────────

  firebase.initializeApp(firebaseConfig);
  const db  = firebase.firestore();
  const col = db.collection("responses");

  const STORAGE_KEY = 'crewEntryId';
  let editingId = null; // doc ID currently being edited

  // ── Radio button visual state ──
  function syncRadios() {
    document.querySelectorAll('.radio-group label').forEach(lbl => {
      const radio = lbl.querySelector('input[type="radio"]');
      lbl.classList.toggle('selected', radio && radio.checked);
    });
  }
  document.querySelectorAll('.radio-group label').forEach(lbl => {
    lbl.addEventListener('click', () => {
      lbl.closest('.radio-group').querySelectorAll('label').forEach(l => l.classList.remove('selected'));
      lbl.classList.add('selected');
    });
  });

  // ── Edit mode helpers ──
  const form          = document.getElementById('signup-form');
  const btn           = document.getElementById('submit-btn');
  const success       = document.getElementById('success-msg');
  const editingBanner = document.getElementById('editing-banner');
  const cancelEdit    = document.getElementById('cancel-edit');

  function enterEditMode(docId, data) {
    editingId = docId;
    document.getElementById('name').value      = data.name      || '';
    document.getElementById('bringing').value  = data.bringing  || '';
    document.getElementById('allergies').value = data.allergies || '';
    document.getElementById('notes').value     = data.notes     || '';

    // Set radio
    document.querySelectorAll('input[name="attending"]').forEach(r => {
      r.checked = r.value === (data.attending || 'yes');
    });
    syncRadios();

    btn.textContent = 'Update →';
    editingBanner.classList.add('visible');
    form.scrollIntoView({ behavior: 'smooth' });
  }

  function exitEditMode() {
    editingId = null;
    form.reset();
    document.querySelectorAll('.radio-group label').forEach((l, i) => {
      l.classList.toggle('selected', i === 0);
    });
    btn.textContent = 'Submit →';
    editingBanner.classList.remove('visible');
  }

  cancelEdit.addEventListener('click', (e) => {
    e.preventDefault();
    exitEditMode();
  });

  // ── Form submit ──
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = editingId ? 'Updating…' : 'Submitting…';

    const attending = document.querySelector('input[name="attending"]:checked')?.value || 'yes';
    const payload = {
      name:      document.getElementById('name').value.trim(),
      attending,
      bringing:  document.getElementById('bringing').value.trim(),
      allergies: document.getElementById('allergies').value.trim(),
      notes:     document.getElementById('notes').value.trim(),
    };

    try {
      if (editingId) {
        // Update existing doc
        await col.doc(editingId).update(payload);
        exitEditMode();
      } else {
        // New submission
        payload.submittedAt = firebase.firestore.FieldValue.serverTimestamp();
        const docRef = await col.add(payload);
        localStorage.setItem(STORAGE_KEY, docRef.id); // 🔑 save token
        form.reset();
        document.querySelectorAll('.radio-group label').forEach((l, i) => {
          l.classList.toggle('selected', i === 0);
        });
      }
      success.style.display = 'block';
      setTimeout(() => { success.style.display = 'none'; }, 3500);
    } catch (err) {
      alert('Something went wrong: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = editingId ? 'Update →' : 'Submit →';
    }
  });

  // ── Live guest list ──
  const list       = document.getElementById('guest-list');
  const countLabel = document.getElementById('guest-count');

  const statusMap = {
    yes:   { label: '✅ Coming',        cls: 'status-yes'   },
    maybe: { label: '🤔 Maybe',         cls: 'status-maybe' },
    no:    { label: "❌ Can't make it", cls: 'status-no'    },
  };

  col.orderBy('submittedAt', 'asc').onSnapshot(snapshot => {
    countLabel.textContent = snapshot.size;
    const myId = localStorage.getItem(STORAGE_KEY);

    if (snapshot.empty) {
      list.innerHTML = '<div class="empty-state">No responses yet — be the first!</div>';
      return;
    }

    list.innerHTML = '';
    snapshot.forEach(doc => {
      const d  = doc.data();
      const st = statusMap[d.attending] || statusMap['yes'];
      const isMe = doc.id === myId;

      const card = document.createElement('div');
      card.className = 'guest-card';

      card.innerHTML = `
        <div class="guest-name">
          ${escHtml(d.name || 'Anonymous')}
          ${isMe ? '<span style="font-size:0.72rem;color:#6c63ff;font-weight:500">(you)</span>' : ''}
          <span class="status-badge ${st.cls}">${st.label}</span>
        </div>
        <div class="guest-meta">
          ${d.bringing  ? `<span>🍽️ ${escHtml(d.bringing)}</span>`  : ''}
          ${d.allergies ? `<span>⚠️ <span class="allergy-tag">${escHtml(d.allergies)}</span></span>` : ''}
          ${d.notes     ? `<span>💬 ${escHtml(d.notes)}</span>`     : ''}
        </div>
        ${isMe ? `
        <div class="guest-actions">
          <button class="btn-edit"   data-id="${doc.id}">✏️ Edit</button>
          <button class="btn-delete" data-id="${doc.id}">🗑 Delete</button>
        </div>` : ''}
      `;

      // Edit
      if (isMe) {
        card.querySelector('.btn-edit').addEventListener('click', () => {
          enterEditMode(doc.id, d);
        });
        // Delete
        card.querySelector('.btn-delete').addEventListener('click', async () => {
          if (!confirm('Remove your response?')) return;
          await col.doc(doc.id).delete();
          localStorage.removeItem(STORAGE_KEY);
          exitEditMode();
        });
      }

      list.appendChild(card);
    });
  });

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
</html>
